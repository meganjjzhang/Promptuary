<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://unpkg.com" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * {
      scrollbar-width: none;
      scrollbar-color: rgba(0, 0, 0, 0.2) transparent;
    }
  </style>
</head>

<body class="bg-[#e8e8e8] min-h-screen flex items-center justify-center p-6">
<link href="https://fonts.googleapis.cn/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style type="text/tailwindcss">
  @theme {
    --color-surface: #ffffff;
    --color-surface-hover: #f5f5f5;
    --color-border: #dcddde;
    --color-text-primary: #1e1e1e;
    --color-text-muted: #7a7d82;
    --color-bg-base: #f8f8f8;
    --color-overlay: rgba(30, 30, 30, 0.35);
    --color-purple-bg: rgba(167,139,250,0.12);
    --color-purple-border: rgba(167,139,250,0.25);
    --color-purple-text: rgba(167,139,250,0.85);
    --color-green-bg: rgba(52,168,83,0.08);
    --color-green-border: rgba(52,168,83,0.30);
    --color-green-text: rgba(30,120,50,0.92);
    --color-red-border: rgba(215,58,73,0.25);
    --color-red-text: rgba(180,40,55,0.90);
    --color-blue-bg: rgba(96,165,250,0.10);
    --color-blue-border: rgba(96,165,250,0.20);
    --color-blue-text: rgba(96,165,250,0.85);
    --color-warn-bg: rgba(251,146,60,0.08);
    --color-warn-border: rgba(251,146,60,0.20);
    --color-warn-text: rgba(251,146,60,0.85);
  }
</style>

<style>
  body { font-family: 'DM Sans', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
</style>

<!-- ==================== Confirm Modal ==================== -->
<div class="fixed inset-0 bg-overlay flex items-center justify-center">
  <div class="w-[500px] bg-surface border border-border rounded-xl shadow-[0_8px_24px_rgba(0,0,0,0.08),0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden flex flex-col">

    <!-- Header -->
    <div class="px-[18px] py-3.5 border-b border-border flex items-center justify-between shrink-0">
      <div class="flex items-center gap-2.5">
        <div class="w-6 h-6 rounded-[7px] bg-blue-bg border border-blue-border flex items-center justify-center">
          <i data-lucide="zap" class="w-3.5 h-3.5 text-blue-text"></i>
        </div>
        <div>
          <h2 class="text-text-primary text-[13px] font-semibold">API 批阅确认</h2>
          <p class="text-text-muted text-[10px] mono mt-0.5">Anthropic (Claude) · 即将发送至 API</p>
        </div>
      </div>
      <button class="w-7 h-7 rounded-md hover:bg-surface-hover flex items-center justify-center text-text-muted hover:text-text-primary transition-colors">
        <i data-lucide="x" class="w-3.5 h-3.5"></i>
      </button>
    </div>

    <!-- Provider badge row -->
    <div class="px-[18px] pt-3 pb-1 flex items-center gap-2">
      <div class="w-5 h-5 rounded bg-blue-bg border border-blue-border flex items-center justify-center">
        <span class="text-[10px] font-bold mono text-blue-text">A</span>
      </div>
      <span class="text-text-primary text-[12px] font-semibold">Anthropic (Claude)</span>
      <span class="text-[8px] mono px-1.5 py-0.5 rounded-full bg-blue-bg text-blue-text border border-blue-border">provider</span>
    </div>

    <!-- Info rows -->
    <div class="px-[18px] py-2">
      <div class="bg-bg-base border border-border rounded-lg overflow-hidden">
        <table class="w-full text-[12px]">
          <tr class="border-b border-border/60">
            <td class="px-3 py-2 text-text-muted mono text-[10px] uppercase tracking-wider w-24">Model</td>
            <td class="px-3 py-2 mono text-text-primary">claude-opus-4-5</td>
          </tr>
          <tr class="border-b border-border/60">
            <td class="px-3 py-2 text-text-muted mono text-[10px] uppercase tracking-wider">Reviews</td>
            <td class="px-3 py-2 mono text-text-primary">3 条批阅</td>
          </tr>
          <tr>
            <td class="px-3 py-2 text-text-muted mono text-[10px] uppercase tracking-wider">Tokens</td>
            <td class="px-3 py-2 mono text-text-primary">~12,400</td>
          </tr>
        </table>
      </div>
    </div>

    <!-- Warning -->
    <div class="px-[18px] py-2">
      <div class="flex items-start gap-2 bg-warn-bg border border-warn-border rounded-lg px-3 py-2.5">
        <i data-lucide="alert-triangle" class="w-3.5 h-3.5 text-warn-text mt-0.5 shrink-0"></i>
        <p class="text-[11px] text-text-primary/80 leading-[1.5]">
          原文与批阅意见将发送至所选 Provider，请确认不含敏感信息。数据将离开本地 Vault。
        </p>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-[18px] py-3 border-t border-border flex items-center justify-between shrink-0 mt-auto">
      <button class="text-[10px] mono font-medium px-3 py-2 rounded-md border border-border text-text-muted hover:text-red-text hover:border-red-border hover:bg-red-50 transition-all">
        <span class="flex items-center gap-1.5">
          <i data-lucide="x" class="w-3 h-3"></i>
          取消
        </span>
      </button>
      <button class="text-[11px] mono font-semibold px-4 py-2 rounded-md bg-green-bg border border-green-border text-green-text hover:bg-green-500/15 transition-all">
        <span class="flex items-center gap-1.5">
          <i data-lucide="send" class="w-3 h-3"></i>
          确认执行
        </span>
      </button>
    </div>
  </div>
</div>

<!-- ==================== Progress Modal ==================== -->
<div class="fixed inset-0 bg-overlay flex items-center justify-center" style="margin-left: 540px">
  <div class="w-[400px] bg-surface border border-border rounded-xl shadow-[0_8px_24px_rgba(0,0,0,0.08),0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden flex flex-col">

    <!-- Header -->
    <div class="px-[18px] py-3.5 border-b border-border flex items-center justify-between shrink-0">
      <div class="flex items-center gap-2.5">
        <div class="w-6 h-6 rounded-[7px] bg-blue-bg border border-blue-border flex items-center justify-center">
          <i data-lucide="zap" class="w-3.5 h-3.5 text-blue-text"></i>
        </div>
        <div>
          <h2 class="text-text-primary text-[13px] font-semibold">API 批阅中…</h2>
          <p class="text-text-muted text-[10px] mono mt-0.5">正在调用 Anthropic API</p>
        </div>
      </div>
    </div>

    <!-- Spinner state -->
    <div class="px-[18px] py-8 flex flex-col items-center gap-3">
      <div class="w-8 h-8 border-2 border-blue-200 border-t-blue-text rounded-full animate-spin"></div>
      <p class="text-[12px] text-text-muted">正在调用 API，请稍候…</p>
    </div>

    <!-- Error state (hidden by default) -->
    <div class="px-[18px] py-4 hidden">
      <div class="flex items-start gap-2 bg-red-50 border border-red-border rounded-lg px-3 py-2.5">
        <i data-lucide="x-circle" class="w-3.5 h-3.5 text-red-text mt-0.5 shrink-0"></i>
        <p class="text-[11px] text-text-primary/80 leading-[1.5]">调用失败：API key 无效</p>
      </div>
    </div>

    <!-- Success state (hidden by default) -->
    <div class="px-[18px] py-4 hidden">
      <div class="flex items-start gap-2 bg-green-50 border border-green-border rounded-lg px-3 py-2.5">
        <i data-lucide="check-circle" class="w-3.5 h-3.5 text-green-text mt-0.5 shrink-0"></i>
        <p class="text-[11px] text-text-primary/80 leading-[1.5]">API 返回成功，即将打开 Diff 预览</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-[18px] py-3 border-t border-border flex items-center justify-end shrink-0 mt-auto">
      <button class="text-[11px] mono font-semibold px-4 py-2 rounded-md bg-green-bg border border-green-border text-green-text hover:bg-green-500/15 transition-all">
        <span class="flex items-center gap-1.5">
          <i data-lucide="git-compare" class="w-3 h-3"></i>
          查看 Diff
        </span>
      </button>
    </div>
  </div>
</div>

</body>
<script>if (window.lucide) lucide.createIcons();</script>
</html>
